<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-red: #ff0055;
            --neon-blue: #00f2ff;
            --bg-dark: #050505;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--neon-green);
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--neon-green);
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: var(--neon-blue);
        }

        /* Border Draw Effect for Canvas Wrapper */
        .canvas-wrapper {
            position: relative;
            padding: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        canvas {
            background: #000;
            display: block;
            border-radius: 5px;
            border: 2px solid rgba(0, 242, 255, 0.3);
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        /* Game Over Overlay */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            z-index: 10;
        }

        #overlay h2 { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); margin-bottom: 15px; }

        .btn {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            box-shadow: 0 0 10px var(--neon-green);
            transition: 0.3s;
        }

        .btn:hover { background: var(--neon-green); color: black; }
    </style>
</head>
<body>

    <div class="game-header">
        <h1>SNAKE_OS</h1>
        <div class="stats">
            <span>SCORE: <span id="score">0</span></span>
            <span>HIGH SCORE: <span id="highScore">0</span></span>
        </div>
    </div>

    <div class="canvas-wrapper">
        <div id="overlay">
            <h2>SYSTEM_CRASH</h2>
            <button class="btn" onclick="resetGame()">Reboot Game</button>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div class="controls-hint">Use Arrow Keys or WASD to Navigate</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");
        const overlay = document.getElementById("overlay");

        // Game Settings
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        highScoreElement.innerText = highScore;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let gameSpeed = 100;
        let gameLoop;

        // Initialize Game
        function init() {
            document.addEventListener("keydown", changeDirection);
            gameLoop = setTimeout(draw, gameSpeed);
        }

        function draw() {
            updateSnake();
            
            if (checkGameOver()) {
                endGame();
                return;
            }

            clearCanvas();
            drawFood();
            drawSnake();
            
            gameLoop = setTimeout(draw, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Optional: Draw grid lines for "Cyber" look
            ctx.strokeStyle = "rgba(0, 242, 255, 0.05)";
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Head is brighter
                ctx.fillStyle = index === 0 ? "#39ff14" : "rgba(57, 255, 20, 0.6)";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#39ff14";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
            ctx.shadowBlur = 0;
        }

        function updateSnake() {
            dx = nextDx;
            dy = nextDy;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                placeFood();
                // Increase speed slightly
                if (gameSpeed > 50) gameSpeed -= 1;
            } else {
                if (dx !== 0 || dy !== 0) snake.pop();
            }
        }

        function drawFood() {
            ctx.fillStyle = "#ff0055";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff0055";
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            // Don't spawn food on snake body
            snake.forEach(part => {
                if(part.x === food.x && part.y === food.y) placeFood();
            });
        }

        function changeDirection(e) {
            const key = e.key.toLowerCase();
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((key === "arrowup" || key === "w") && !goingDown) { nextDx = 0; nextDy = -1; }
            if ((key === "arrowdown" || key === "s") && !goingUp) { nextDx = 0; nextDy = 1; }
            if ((key === "arrowleft" || key === "a") && !goingRight) { nextDx = -1; nextDy = 0; }
            if ((key === "arrowright" || key === "d") && !goingLeft) { nextDx = 1; nextDy = 0; }
        }

        function checkGameOver() {
            const head = snake[0];
            // Wall Collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return true;
            // Self Collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) return true;
            }
            return false;
        }

        function endGame() {
            clearTimeout(gameLoop);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScore", highScore);
                highScoreElement.innerText = highScore;
            }
            overlay.style.display = "flex";
        }

        function resetGame() {
            score = 0;
            scoreElement.innerText = score;
            snake = [{x: 10, y: 10}];
            nextDx = 0;
            nextDy = 0;
            dx = 0;
            dy = 0;
            gameSpeed = 100;
            overlay.style.display = "none";
            placeFood();
            init();
        }

        init();
    </script>
</body>
</html>
