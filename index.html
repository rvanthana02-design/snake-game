<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00f2ff;
            --neon-red: #ff0055;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Orbitron', sans-serif;
            background: #050505;
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }
        .wrapper { position: relative; padding: 10px; border: 2px solid var(--neon-blue); border-radius: 10px; box-shadow: 0 0 15px var(--neon-blue); }
        h1 { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); margin-bottom: 10px; }
        canvas { background: #000; display: block; border-radius: 5px; }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; border-radius: 10px;
        }
        .btn {
            background: transparent; border: 2px solid var(--neon-green); color: var(--neon-green);
            padding: 15px 30px; cursor: pointer; font-family: 'Orbitron', sans-serif;
            text-transform: uppercase; box-shadow: 0 0 10px var(--neon-green); transition: 0.3s;
        }
        .btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 25px var(--neon-green); }
        #score-board { color: var(--neon-blue); margin-bottom: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <h1>SNAKE_OS</h1>
    <div id="score-board">SCORE: 0</div>

    <div class="wrapper">
        <div id="overlay" class="overlay">
            <h2 id="status-text" style="color:var(--neon-red); margin-bottom:20px; display:none;">CRITICAL FAILURE</h2>
            <button class="btn" onclick="initGame()">Initialize</button>
        </div>
        <canvas id="snakeCanvas" width="400" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("snakeCanvas");
        const ctx = canvas.getContext("2d");
        const scoreBoard = document.getElementById("score-board");
        const overlay = document.getElementById("overlay");
        const statusText = document.getElementById("status-text");

        const box = 20; // size of one square
        let snake, food, d, score, gameInterval;

        function initGame() {
            // 1. Reset variables
            snake = [{ x: 9 * box, y: 10 * box }];
            score = 0;
            d = "RIGHT"; // Initial direction
            scoreBoard.innerHTML = "SCORE: 0";
            overlay.style.display = "none";
            statusText.style.display = "none";
            
            spawnFood();
            
            // 2. Clear previous interval if any and start fresh
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(draw, 100);
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * 19 + 1) * box,
                y: Math.floor(Math.random() * 19 + 1) * box
            };
        }

        // Handle Keys
        document.addEventListener("keydown", direction);
        function direction(event) {
            let key = event.keyCode;
            if (key == 37 && d != "RIGHT") d = "LEFT";
            else if (key == 38 && d != "DOWN") d = "UP";
            else if (key == 39 && d != "LEFT") d = "RIGHT";
            else if (key == 40 && d != "UP") d = "DOWN";
            // WASD Support
            else if (key == 65 && d != "RIGHT") d = "LEFT";
            else if (key == 87 && d != "DOWN") d = "UP";
            else if (key == 68 && d != "LEFT") d = "RIGHT";
            else if (key == 83 && d != "UP") d = "DOWN";
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            // Clear Background
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Snake
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#39ff14" : "rgba(57, 255, 20, 0.5)";
                ctx.strokeStyle = "#050505";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // Draw Food
            ctx.fillStyle = "#ff0055";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff0055";
            ctx.fillRect(food.x, food.y, box, box);
            ctx.shadowBlur = 0;

            // Old head position
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // Move direction
            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // Check if snake eats food
            if (snakeX == food.x && snakeY == food.y) {
                score++;
                scoreBoard.innerHTML = "SCORE: " + (score * 10);
                spawnFood();
            } else {
                snake.pop(); // Remove tail
            }

            let newHead = { x: snakeX, y: snakeY };

            // Game Over Rules
            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(gameInterval);
                overlay.style.display = "flex";
                statusText.style.display = "block";
                return;
            }

            snake.unshift(newHead);
        }
    </script>
</body>
</html>
