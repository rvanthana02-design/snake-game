<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-red: #ff0055;
            --neon-blue: #00f2ff;
            --bg-dark: #050505;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* SVG Border Animation */
        .wrapper {
            position: relative;
            padding: 10px;
        }

        .border-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            fill: none;
            pointer-events: none;
        }

        .border-rect {
            stroke: var(--neon-blue);
            stroke-width: 4;
            width: 100%; height: 100%;
            rx: 10;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: drawBorder 3s linear forwards;
            filter: drop-shadow(0 0 8px var(--neon-blue));
        }

        @keyframes drawBorder { to { stroke-dashoffset: 0; } }

        .game-header { text-align: center; margin-bottom: 20px; z-index: 2; }
        h1 { color: var(--neon-green); letter-spacing: 5px; text-shadow: 0 0 10px var(--neon-green); }

        .stats { display: flex; gap: 20px; color: var(--neon-blue); font-size: 14px; margin-top: 5px; }

        canvas {
            background: #000;
            display: block;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
            position: relative;
            z-index: 1;
        }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 10px; left: 10px; 
            width: calc(100% - 20px); height: calc(100% - 20px);
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 5px;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px 24px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            box-shadow: 0 0 10px var(--neon-green);
            transition: 0.3s;
            margin-top: 15px;
        }

        .btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 25px var(--neon-green); }
        
        #game-over-text { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); display: none; }
    </style>
</head>
<body>

    <div class="game-header">
        <h1>SNAKE_OS</h1>
        <div class="stats">
            <span>SCORE: <span id="score">0</span></span>
            <span>HIGH SCORE: <span id="highScore">0</span></span>
        </div>
    </div>

    <div class="wrapper">
        <svg class="border-svg"><rect class="border-rect"></rect></svg>
        
        <div id="start-overlay" class="overlay">
            <h2 id="game-over-text">SYSTEM_CRASH</h2>
            <button class="btn" onclick="startGame()">Initialize Game</button>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");
        const overlay = document.getElementById("start-overlay");
        const gameOverText = document.getElementById("game-over-text");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        highScoreElement.innerText = highScore;

        let snake = [];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let gameActive = false;

        function startGame() {
            snake = [{x: 10, y: 10}];
            dx = 1; // Start moving right immediately
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            overlay.style.display = "none";
            gameActive = true;
            placeFood();
            main();
        }

        function main() {
            if (!gameActive) return;

            if (didGameEnd()) {
                gameActive = false;
                showGameOver();
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#39ff14" : "rgba(57, 255, 20, 0.5)";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#39ff14";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
            ctx.shadowBlur = 0;
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                placeFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > tileCount - 1;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > tileCount - 1;
            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        function showGameOver() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScore", highScore);
                highScoreElement.innerText = highScore;
            }
            gameOverText.style.display = "block";
            overlay.style.display = "flex";
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function changeDirection(event) {
            if (!gameActive) return;
            const keyPressed = event.keyCode;
            const LEFT = 37, UP = 38, RIGHT = 39, DOWN = 40;
            const W = 87, A = 65, S = 83, D = 68;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((keyPressed === LEFT || keyPressed === A) && !goingRight) { dx = -1; dy = 0; }
            if ((keyPressed === UP || keyPressed === W) && !goingDown) { dx = 0; dy = -1; }
            if ((keyPressed === RIGHT || keyPressed === D) && !goingLeft) { dx = 1; dy = 0; }
            if ((keyPressed === DOWN || keyPressed === S) && !goingUp) { dx = 0; dy = 1; }
        }

        document.addEventListener("keydown", changeDirection);
    </script>
</body>
</html>
